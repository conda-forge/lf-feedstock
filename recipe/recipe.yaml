schema_version: 1

context:
  version: r38

package:
  name: lf
  version: ${{ version }}

source:
  url: https://github.com/gokcehan/lf/archive/${{ version }}.tar.gz
  sha256: 01531e7a78d8bfbe14739072e93446d003f0e4ce12032a26671fa326b73bc911

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - lf --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Terminal file manager
  homepage: https://godoc.org/github.com/gokcehan/lf
  repository: https://github.com/gokcehan/lf

extra:
  recipe-maintainers:
    - danielnachun
